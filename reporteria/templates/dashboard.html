<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Reportes</title>
  <style>
    /* Estilos generales */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #EEEEEE;
    }

    /* Encabezado */
    .header {
      background-color: #32E0C4;
      color: #fff;
      padding: 15px 0;
      text-align: center;
    }

    .header h1 {
      margin: 0;
    }

    /* Contenedor principal */
    .main-container {
      padding: 20px;
    }

    /* Secciones */
    .section {
      background-color: #fff;
      border-radius: 5px;
      margin-bottom: 20px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .section h2 {
      color: #393E46;
      margin-top: 0;
    }

    /* Gráficos */
    .chart {
      width: 100%;
      height: 300px;
    }

    /* Tablas */
    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th,
    .table td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .table th {
      text-align: left;
      background-color: #393E46;
      color: #fff;
    }

    /* Botones */
    .button {
      background-color: #32E0C4;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Dashboard</h1>
  </div>

  <div class="main-container">

    <div class="section">
      <h2>Ventas</h2>
      <p></p>

      <div class="chart"></div>
    </div>

    <div class="section">
      <h2>Reportes</h2>
      <p></p>

      <table class="table">
        <thead>
          <tr>
            <th>Número de Reporte</th>
            <th>Nombre de Grupo</th>
            <th>Fecha de Subida</th>
            <th>Fecha del Reporte</th>
            <th>Opciones</th>
        </thead>
        <tbody>
          <tr>
            <td>RPT1987</td>
            <td>Ventas</td>
            <td>25/07/2024</td>
            <td>De 25/06/2024 a 20/07/2024</td>
            <td >Descargar</td>
          </tr>
          <tr>
            <td>RPT1986</td>
            <td>Post-Venta</td>
            <td>25/07/2024</td>
            <td>De 25/06/2024 a 20/07/2024</td>
            <td>Descargar</td>
        </tr>
        <tr>
          <td>RPT1985</td>
          <td>Stock</td>
          <td>25/07/2024</td>
          <td>De 25/06/2024 a 20/07/2024</td>
          <td><span class="badge badge-success">Descargar</span></td>
      </tr>
          </tbody>
      </table>
    </div>

    <button class="button">Ver más detalles</button>

  </div>

</body>
</html>
